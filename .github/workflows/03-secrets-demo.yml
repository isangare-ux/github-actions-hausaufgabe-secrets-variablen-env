run-name: "03-secrets-demo - ${{ github.actor }}"

on:
  workflow_dispatch:

jobs:
  secrets-check:
    name: Secret-prüfen
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Skripte ausführbar machen
        run: chmod +x scripts/*.sh

      - name: Skripte ausführen
        run: bash scripts/03_secret_check.sh
        env:
          API_TOKEN: ${{ secrets.DEMO_API_TOKEN }}
    
      - name: secret-report als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Repository-Variables
          path: output/secret-report.txt
